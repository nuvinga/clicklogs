<html>

	<head>
		<meta charset="utf8"/>
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
		<link rel="stylesheet" href="index.css">
		<link href="https://fonts.googleapis.com/css?family=Open+Sans|Open+Sans+Condensed:300|Roboto" rel="stylesheet"> 
		<link href='https://fonts.googleapis.com/css?family=Ek+Mukta:300' rel='stylesheet' type='text/css'>

		<script type="text/javascript">
			let totalTouchDuration = 0;

			let tapCounter = 0;
			let startTap = 0, endTap = 0;
			let tapSessionStartTime = 0;

			let sessionId = "";
			let devicePlatform = "";

			let currentInterfaceTaps = [];

			let showFeedback = false;
			let interfaceVariations = 2;
			let interfaceSequence = 1;

			const API_URL = "http://localhost:3000/saveTaps";

			function currentInterfaceType() {
				return showFeedback ? "feedbackshown" : "nofeedback";
			}

			function onLoad() {
				const el = document.getElementById("tapHere");
				const now = new Date();

				// Keep the original random-ish assignment behavior
				showFeedback = (now.getTime() % 2 === 0);

				// Session ID used across both interface variations
				sessionId = `${Date.now()}_${Math.floor(Math.random() * 1000)}`;

				["mouseup", "mousedown", "touchstart", "touchend"].forEach(function (eventName) {
					el.addEventListener(eventName, tapityTap, { passive: false });
				});
			}

			function saveDependentVariable(selectedPlatform) {
				devicePlatform = selectedPlatform.toLowerCase(); // "android" or "pc"
				document.getElementById("buttoncontainer").style.display = "none";
				document.getElementById("container").style.display = "inline-block";
			}

			async function syncToServer(payload) {
				const response = await fetch(API_URL, {
					method: "POST",
					headers: {
						"Content-Type": "application/json"
					},
					body: JSON.stringify(payload)
				});

				if (!response.ok) {
					throw new Error(`Server error: ${response.status}`);
				}

				const data = await response.json();

				if (!data.ok) {
					throw new Error(data.message || "Unknown server error");
				}

				return data;
			}

			async function finishInterface(meanTouchDuration) {
				const finalInterface = (interfaceSequence === interfaceVariations);

				const payload = {
					sessionId: sessionId,
					devicePlatform: devicePlatform,
					interfaceSequence: interfaceSequence,
					interfaceType: currentInterfaceType(),
					sessionCompleted: finalInterface,
					taps: currentInterfaceTaps
				};

				document.getElementById("tapHere").style.display = "none";
				document.getElementById("counter").innerHTML =
					'<span class="spanWhite">Mean tap duration: <span class="spanTime">' +
					Math.round(meanTouchDuration) +
					'</span> ms</span>';

				try {
					await syncToServer(payload);

					if (finalInterface) {
						document.getElementById("action").innerHTML = "All data saved successfully.";
						document.getElementById("continue").style.display = "none";
					} else {
						document.getElementById("action").innerHTML = "Interface 1 saved. Click Continue.";
						document.getElementById("continue").style.display = "block";
					}
				} catch (error) {
					console.error(error);
					document.getElementById("action").innerHTML = "Failed to save data. Please try again.";
					document.getElementById("continue").style.display = finalInterface ? "none" : "block";
				}
			}

			function tapityTap(event) {
				const d = new Date();
				const te = event.type;

				document.getElementById("action").innerHTML = te;

				if (te === "touchstart" || te === "touchend") {
					event.preventDefault();
				}

				if (te === "touchstart" || te === "mousedown") {
					startTap = d.getTime();

					if (tapSessionStartTime === 0) {
						tapSessionStartTime = startTap;
					}
					return;
				}

				if (te === "touchend" || te === "mouseup") {
					endTap = d.getTime();

					if (startTap === 0 || endTap === 0 || startTap > endTap) {
						startTap = 0;
						endTap = 0;
						return;
					}

					const duration = endTap - startTap;

					tapCounter++;
					totalTouchDuration += duration;

					const meanTouchDuration = totalTouchDuration / tapCounter;

					const tap = {
						sessionId: sessionId,
						devicePlatform: devicePlatform,
						interfaceSequence: interfaceSequence,
						interfaceType: currentInterfaceType(),
						tapSequenceNumber: tapCounter,
						startTimestampMs: startTap,
						endTimestampMs: endTap,
						durationMs: duration
					};

					currentInterfaceTaps.push(tap);

					if (showFeedback) {
						document.getElementById("counter").innerHTML =
							'Mean tap duration: <span class="spanTime">' +
							Math.round(meanTouchDuration) +
							'</span> ms';
					}

					startTap = 0;
					endTap = 0;

					if (tapCounter >= 50) {
						finishInterface(meanTouchDuration);
					}
				}
			}

			function startNext() {
				interfaceSequence++;

				startTap = 0;
				endTap = 0;
				tapCounter = 0;
				totalTouchDuration = 0;
				tapSessionStartTime = 0;
				currentInterfaceTaps = [];

				document.getElementById("tapHere").style.display = "block";
				document.getElementById("continue").style.display = "none";
				document.getElementById("counter").innerHTML = "";
				document.getElementById("action").innerHTML = "";

				showFeedback = !showFeedback;
			}
		</script>

	</head>

	<body onLoad="onLoad()">
		<div>
			<div id="buttoncontainer">
				<button type="button" onclick="saveDependentVariable('android')" id="variable1">Android</button>
				<button type="button" onclick="saveDependentVariable('pc')" id="variable2">PC</button>
			</div>
			<div id="container" class="container">
				<div id="counter"></div>
				<div id="action"></div>
				<button id="tapHere"><img src="2x/round_touch_app_white_36dp.png"/></button>
				<button id="continue" onclick="startNext()">Continue</button>
			</div>
		</div>
	</body>
</html>
